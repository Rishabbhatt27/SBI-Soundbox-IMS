// ======== MODALS ========
function rModal(){
  const m=S.modal;
  if(!m) return '';
  const wrap=(title,body,footer)=>`<div class="mov" onclick="closeMov(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="mhd"><span class="mtt">${title}</span><span class="mxx" onclick="S.modal=null;render()">✕</span></div>
      ${body}
      <div class="mft">${footer}</div>
    </div></div>`;

  if(m==='add-admin') return wrap('Add new admin',
    `<div class="frow"><div class="fg"><label class="fl">First name</label><input class="fi" placeholder="First name"></div>
    <div class="fg"><label class="fl">Last name</label><input class="fi" placeholder="Last name"></div></div>
    <div class="fg"><label class="fl">Email address</label><input class="fi" placeholder="admin@sbi.co.in" type="email"></div>
    <div class="frow"><div class="fg"><label class="fl">Phone number</label><input class="fi" placeholder="+91 98765 43210"></div>
    <div class="fg"><label class="fl">Location</label><input class="fi" placeholder="City"></div></div>
    <div class="frow"><div class="fg"><label class="fl">Password</label><input class="fi" type="password" placeholder="Set password"></div>
    <div class="fg"><label class="fl">Confirm password</label><input class="fi" type="password" placeholder="Re-enter password"></div></div>`,
    `<button class="btn-s" onclick="S.modal=null;render()">Cancel</button>
    <button class="btn-p" onclick="S.modal=null;render()">Create admin</button>`);

  if(m==='add-user') return wrap('Add field agent',
    `<div class="frow"><div class="fg"><label class="fl">First name</label><input class="fi" placeholder="First name"></div>
    <div class="fg"><label class="fl">Last name</label><input class="fi" placeholder="Last name"></div></div>
    <div class="frow"><div class="fg"><label class="fl">Email</label><input class="fi" placeholder="agent@sbi.co.in" type="email"></div>
    <div class="fg"><label class="fl">Location</label><input class="fi" placeholder="City / Area"></div></div>
    <div class="fg"><label class="fl">Assign admin</label><select class="fi">${ADMINS.map(a=>`<option>${a.name}</option>`).join('')}</select></div>
    <div class="frow"><div class="fg"><label class="fl">Password</label><input class="fi" type="password" placeholder="Set password"></div>
    <div class="fg"><label class="fl">Confirm password</label><input class="fi" type="password" placeholder="Re-enter password"></div></div>`,
    `<button class="btn-s" onclick="S.modal=null;render()">Cancel</button>
    <button class="btn-p" onclick="S.modal=null;render()">Create user</button>`);

  if(m==='add-wh') return wrap('Add warehouse',
    `<div class="fg"><label class="fl">Warehouse name</label><input class="fi" placeholder="e.g. WH Mumbai Central"></div>
    <div class="frow"><div class="fg"><label class="fl">Location / city</label><input class="fi" placeholder="City"></div>
    <div class="fg"><label class="fl">Area</label><input class="fi" placeholder="Area name"></div></div>
    <div class="frow"><div class="fg"><label class="fl">Pincode</label><input class="fi" placeholder="400001"></div>
    <div class="fg"><label class="fl">Assigned admin</label><select class="fi">${ADMINS.map(a=>`<option>${a.name}</option>`).join('')}</select></div></div>`,
    `<button class="btn-s" onclick="S.modal=null;render()">Cancel</button>
    <button class="btn-p" onclick="S.modal=null;render()">Add warehouse</button>`);

  if(m==='wh-upload'||m==='user-import') return wrap(
    m==='user-import'?'Import devices for user':'Upload devices to warehouse',
    `<div class="uz">
      <div style="font-size:30px;color:var(--bl);margin-bottom:8px">↑</div>
      <div style="font-size:13px;font-weight:700;margin-bottom:4px">Drag & drop or click to select</div>
      <div style="font-size:11px;color:var(--mt)">.xlsx or .xls files only</div>
    </div>
    <div class="xp">
      <div class="xh"><span>IMEI Number</span><span>Serial No.</span><span>Date</span></div>
      <div class="xr"><span style="font-family:monospace">863411001234567</span><span>SB-9201</span><span>14 Apr 2026</span></div>
      <div class="xr"><span style="font-family:monospace">863411001234568</span><span>SB-9202</span><span>14 Apr 2026</span></div>
    </div>
    <div style="margin-top:10px;background:var(--bll);border:0.5px solid var(--blb);border-radius:7px;padding:8px 10px;font-size:11px;color:#1D4ED8;font-weight:600">
      Column A = IMEI &nbsp;·&nbsp; Column B = Serial No. &nbsp;·&nbsp; Column C = Date
    </div>`,
    `<button class="btn-s" onclick="S.modal=null;render()">Cancel</button>
    <button class="btn-p" onclick="S.modal=null;render()">Import data</button>`);

  return '';
}

function closeMov(e){if(e.target===e.currentTarget){S.modal=null;render();}}
function gp(p){S.page=p;S.modal=null;S.openWH=null;S.openUser=null;render();}

function render(){
  const root=$('root');
  if(S.scr==='login'){root.innerHTML=rLogin();return;}
  root.innerHTML=`<div class="dl">
    ${rSB()}
    <div class="ma">
      ${rTB()}
      <div class="ct" id="pc">
        ${rPage()}
        ${rModal()}
      </div>
    </div>
  </div>`;
}
render();
</script>
