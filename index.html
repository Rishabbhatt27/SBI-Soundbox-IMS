function doLogin(){
  const e=($('lem')||{}).value||'',p=($('lpw')||{}).value||'';

  Object.entries(ROLES).forEach(([r,c])=>{if(c.email===e&&c.pass===p)f=r;});

}

function rModal(){
  const m=S.modal;
  if(!m) return '';
  const wrap=(title,body,footer)=>`<div class="mov" onclick="closeMov(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="mhd"><span class="mtt">${title}</span><span class="mxx" onclick="S.modal=null;render()">✕</span></div>
      ${body}
      <div class="mft">${footer}</div>
    </div></div>`;

  if(m==='add-zsm') return wrap('Add Zonal Sales Manager',
    `<div class="frow"><div class="fg"><label class="fl">First name</label><input class="fi" placeholder="First name"></div>
    <div class="fg"><label class="fl">Last name</label><input class="fi" placeholder="Last name"></div></div>
    <div class="frow"><div class="fg"><label class="fl">Email</label><input class="fi" placeholder="zsm@sbi.co.in" type="email"></div>
    <div class="fg"><label class="fl">Phone</label><input class="fi" placeholder="+91 98765 43210"></div></div>
    <div class="fg"><label class="fl">Location</label><input class="fi" placeholder="City"></div>
    <div class="fg"><label class="fl">Assign warehouse</label><select class="fi">${WAREHOUSES.map(w=>`<option>${w.name}</option>`).join('')}</select></div>
    <div class="frow"><div class="fg"><label class="fl">Password</label><input class="fi" type="password" placeholder="Set password"></div>
    <div class="fg"><label class="fl">Confirm password</label><input class="fi" type="password" placeholder="Confirm"></div></div>`,
    `<button class="btn-s" onclick="S.modal=null;render()">Cancel</button>
    <button class="btn-p" onclick="S.modal=null;render()">Create ZSM</button>`);

  if(m==='add-wh') return wrap('Add warehouse',
    `<div class="fg"><label class="fl">Warehouse name</label><input class="fi" placeholder="e.g. WH Kolkata North"></div>
    <div class="frow"><div class="fg"><label class="fl">Location / city</label><input class="fi" placeholder="City"></div>
    <div class="fg"><label class="fl">Area</label><input class="fi" placeholder="Area name"></div></div>
    <div class="frow"><div class="fg"><label class="fl">Pincode</label><input class="fi" placeholder="400001"></div>
    <div class="fg"><label class="fl">Assign ZSM</label><select class="fi">${ZSMS.map(z=>`<option>${z.name}</option>`).join('')}</select></div></div>`,
    `<button class="btn-s" onclick="S.modal=null;render()">Cancel</button>
    <button class="btn-p" onclick="S.modal=null;render()">Add warehouse</button>`);

  if(m==='add-user') return wrap('Add field user',
    `<div class="frow"><div class="fg"><label class="fl">First name</label><input class="fi" placeholder="First name"></div>
    <div class="fg"><label class="fl">Last name</label><input class="fi" placeholder="Last name"></div></div>
    <div class="fg"><label class="fl">Phone</label><input class="fi" placeholder="+91 98765 43210"></div>
    <div class="fg"><label class="fl">Email</label><input class="fi" placeholder="user@sbi.co.in" type="email"></div>
    <div class="fg"><label class="fl">Location / area</label><input class="fi" placeholder="Area, City"></div>`,
    `<button class="btn-s" onclick="S.modal=null;render()">Cancel</button>
    <button class="btn-p" onclick="S.modal=null;render()">Add user</button>`);

  if(m==='wh-upload'||m==='user-import'||m==='send-upload') return wrap(
    m==='user-import'?'Import devices for user':m==='send-upload'?'Upload shipment Excel':'Upload inventory to warehouse',
    `<div class="uz">
      <div style="font-size:30px;color:var(--bl);margin-bottom:8px">↑</div>
      <div style="font-size:13px;font-weight:700;margin-bottom:4px">Drag & drop or click to select</div>

    </div>
    <div class="xp">
      ${m==='send-upload'?`
      <div class="xh" style="grid-template-columns:1.5fr 1fr 0.8fr 1fr 1fr"><span>IMEI</span><span>Serial</span><span>Box ID</span><span>Shipment ID</span><span>Date</span></div>

      <div class="xh" style="grid-template-columns:2fr 1fr 1fr"><span>IMEI Number</span><span>Serial No.</span><span>Date</span></div>
      <div class="xr" style="grid-template-columns:2fr 1fr 1fr;background:#fff"><span style="font-family:monospace">863411001234567</span><span>SB-9201</span><span>18 Apr 2026</span></div>`}

    `<button class="btn-s" onclick="S.modal=null;render()">Cancel</button>
    <button class="btn-p" onclick="S.modal=null;render()">Import data</button>`);

  return '';
}

function closeMov(e){if(e.target===e.currentTarget){S.modal=null;render();}}
function gp(p){S.page=p;S.modal=null;S.openWH=null;S.openShip=null;S.openUser=null;render();}

function render(){
  const root=$('root');
  if(S.scr==='login'){root.innerHTML=rLogin();return;}
  root.innerHTML=`<div class="dl">
    ${rSB()}
    <div class="ma">
      ${rTB()}
      <div class="ct" id="pc">
        ${rPage()}
        ${rModal()}
      </div>
    </div>
  </div>`;
}
render();
