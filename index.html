function doLogin(){
  const e=($('lem')||{}).value||'',p=($('lpw')||{}).value||'';
  let f=null;
  Object.entries(ROLES).forEach(([r,c])=>{if(c.email===e&&c.pass===p)f=r;});
  if(f){S.role=f;S.scr='app';S.page='dash';S.modal=null;render();}
  else{const el=$('lerr');if(el)el.style.display='block';}
}

// ── PAGE ROUTER ──
function rPage(){
  const {role:r,page:p}=S;
  if(p==='wh-detail') return rWHDetail();
  if(p==='ship-detail') return rShipDetail();
  if(p==='fso-detail') return rFSODetail();
  if(r==='walnut'){
    if(p==='dash') return rWalnutDash();
    if(p==='wh') return rWHList();
    if(p==='transit') return rTransit('walnut');
    if(p==='send') return rSendStock();
    if(p==='zsm') return rZSMManage();
    if(p==='fso') return rFSOManage('walnut');
    if(p==='hist') return rMerchantHistPage('walnut');
    if(p==='rep') return rReports();
  }
  if(r==='zsm'){
    if(p==='dash') return rZSMDash();
    if(p==='wh'){S.openWH='W1';return rWHDetail();}
    if(p==='transit') return rTransit('zsm');
    if(p==='fso') return rFSOManage('zsm');
    if(p==='alloc') return rAlloc();
    if(p==='hist') return rMerchantHistPage('zsm');
  }
  if(r==='fso'){
    if(p==='dash') return rFSODash();
    if(p==='dev') return rMyDevices();
    if(p==='deploy') return rDeployForm();
    if(p==='hist') return rMerchantHistPage('fso');
  }
  if(r==='sbi'){
    if(p==='dash') return rSBIDash();
    if(p==='wh') return rWHList();
    if(p==='transit') return rTransit('sbi');
    if(p==='hist') return rMerchantHistPage('sbi');
    if(p==='rep') return rReports();
  }
  return '';
}

  if(m==='add-zsm') return wrap('Add ZSM',`<div class="frow"><div class="fg"><label class="fl">First name</label><input class="fi" placeholder="First"></div><div class="fg"><label class="fl">Last name</label><input class="fi" placeholder="Last"></div></div><div class="frow"><div class="fg"><label class="fl">Email</label><input class="fi" placeholder="zsm@sbi.co.in" type="email"></div><div class="fg"><label class="fl">Phone</label><input class="fi" placeholder="+91…"></div></div><div class="fg"><label class="fl">Location</label><input class="fi" placeholder="City"></div><div class="fg"><label class="fl">Assign warehouse</label><select class="fi">${WAREHOUSES.map(w=>`<option>${w.name}</option>`).join('')}</select></div><div class="frow"><div class="fg"><label class="fl">Password</label><input class="fi" type="password" placeholder="Set password"></div><div class="fg"><label class="fl">Confirm password</label><input class="fi" type="password" placeholder="Confirm"></div></div>`,
    `<button class="btn-s" onclick="S.modal=null;render()">Cancel</button><button class="btn-p" onclick="S.modal=null;render()">Create ZSM</button>`);

  if(m==='add-fso') return wrap('Add FSO',`<div class="frow"><div class="fg"><label class="fl">First name</label><input class="fi" placeholder="First"></div><div class="fg"><label class="fl">Last name</label><input class="fi" placeholder="Last"></div></div><div class="fg"><label class="fl">Phone</label><input class="fi" placeholder="+91…"></div><div class="fg"><label class="fl">Email</label><input class="fi" placeholder="fso@sbi.co.in" type="email"></div><div class="fg"><label class="fl">Location</label><input class="fi" placeholder="Area, City"></div><div class="fg"><label class="fl">Assign ZSM</label><select class="fi">${ZSMS.map(z=>`<option>${z.name}</option>`).join('')}</select></div><div class="frow"><div class="fg"><label class="fl">Password</label><input class="fi" type="password" placeholder="Set password"></div><div class="fg"><label class="fl">Confirm password</label><input class="fi" type="password" placeholder="Confirm"></div></div>`,
    `<button class="btn-s" onclick="S.modal=null;render()">Cancel</button><button class="btn-p" onclick="S.modal=null;render()">Create FSO</button>`);

  if(m==='add-wh') return wrap('Add warehouse',`<div class="fg"><label class="fl">Warehouse name</label><input class="fi" placeholder="e.g. WH Kolkata"></div><div class="frow"><div class="fg"><label class="fl">City</label><input class="fi" placeholder="City"></div><div class="fg"><label class="fl">Area</label><input class="fi" placeholder="Area"></div></div><div class="frow"><div class="fg"><label class="fl">Pincode</label><input class="fi" placeholder="400001"></div><div class="fg"><label class="fl">Assign ZSM</label><select class="fi">${ZSMS.map(z=>`<option>${z.name}</option>`).join('')}</select></div></div>`,
    `<button class="btn-s" onclick="S.modal=null;render()">Cancel</button><button class="btn-p" onclick="S.modal=null;render()">Add warehouse</button>`);

  if(['wh-upload','fso-import','send-upload'].includes(m)) return wrap(m==='fso-import'?'Import devices for FSO':m==='send-upload'?'Upload shipment Excel':'Upload inventory',
    `<div class="uz"><div style="font-size:26px;color:var(--bl);margin-bottom:7px">↑</div><div style="font-size:13px;font-weight:700;margin-bottom:3px">Drag & drop or click</div><div style="font-size:11px;color:var(--mt)">${m==='send-upload'?'IMEI | Serial | Box ID | Shipment ID | Date':'IMEI | Serial | Date'}</div></div><div style="margin-top:9px;background:var(--bll);border:0.5px solid var(--blb);border-radius:7px;padding:7px 10px;font-size:11px;color:#1D4ED8;font-weight:700">${m==='send-upload'?'5 columns required':'3 columns required'}</div>`,
    `<button class="btn-s" onclick="S.modal=null;render()">Cancel</button><button class="btn-p" onclick="S.modal=null;render()">Import data</button>`);
  return '';
}

function closeMov(e){if(e.target===e.currentTarget){S.modal=null;render();}}
function gp(p){S.page=p;S.modal=null;S.openWH=null;S.openShip=null;S.openUser=null;S.openFSO=null;render();}
function render(){
  const root=$('root');
  if(S.scr==='login'){root.innerHTML=rLogin();return;}
  root.innerHTML=`<div class="dl">${rSB()}<div class="ma">${rTB()}<div class="ct" id="pc">${rPage()}${rModal()}</div></div></div>`;
}
render();
</script>
