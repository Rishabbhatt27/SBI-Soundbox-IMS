<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBI Soundbox IMS • Walnut • Live Demo</title>
    <style>
        /* ----- DESIGN SYSTEM (Same as before, slightly polished) ----- */
        *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui, -apple-system, sans-serif}
        :root{--bl:#2F6FED;--bll:#EFF6FF;--blb:#BFDBFE;--gn:#16A34A;--gnl:#F0FDF4;--gnb:#BBF7D0;--or:#D97706;--orl:#FFFBEB;--orb:#FDE68A;--rd:#DC2626;--rdl:#FEF2F2;--rdb:#FECACA;--br:#E2E8F0;--tx:#0F172A;--mt:#64748B;--sf:#F8FAFC;--w:#fff}
        body{background:#0F172A;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;}
        .app{background:#F1F5F9;font-size:13px;color:var(--tx);min-height:720px;width:100%;max-width:1440px;border-radius:24px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);overflow:hidden;border:0.5px solid #334155;}
        /* LOGIN */
        .ls{display:flex;min-height:720px}
        .ll{flex:1;background:#0F172A;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;text-align:center}
        .ll-ico{width:56px;height:56px;background:var(--bl);border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700;margin:0 auto 18px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.2)}
        .ll-h{font-size:26px;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:-0.02em}
        .ll-s{font-size:13px;color:#94A3B8;max-width:280px;line-height:1.7;margin:0 auto 32px}
        .ll-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:280px;margin:0 auto}
        .ll-stat{background:rgba(255,255,255,0.04);backdrop-filter:blur(4px);border:0.5px solid rgba(255,255,255,0.1);border-radius:14px;padding:16px 8px}
        .ll-sv{font-size:22px;font-weight:700;color:#fff}
        .ll-sl{font-size:10px;color:#64748B;margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
        .lr{width:460px;background:#fff;display:flex;flex-direction:column;justify-content:center;padding:52px 44px}
        .lr-h{font-size:24px;font-weight:700;color:var(--tx);margin-bottom:6px;letter-spacing:-0.02em}
        .lr-s{font-size:13px;color:var(--mt);margin-bottom:24px;line-height:1.6}
        .role-sel{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
        .role-opt{padding:14px 16px;border:1px solid var(--br);border-radius:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px}
        .role-opt:hover{border-color:var(--bl);background:var(--bll);transform:translateY(-1px);box-shadow:0 4px 6px -2px rgba(47,111,237,0.1)}
        .role-opt.on{border-color:var(--bl);background:var(--bll);box-shadow:0 4px 6px -2px rgba(47,111,237,0.15)}
        .role-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
        .role-name{font-size:13px;font-weight:700;color:var(--tx)}
        .role-desc{font-size:11px;color:var(--mt);margin-top:2px}
        .cred-box{background:var(--sf);border:0.5px solid var(--br);border-radius:12px;padding:12px;margin-bottom:24px}
        .cred-hd{font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
        .cred-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--br)}
        .cred-row:last-child{border:none}
        .cred-r{font-size:12px;font-weight:600;color:var(--tx)}
        .cred-c{font-size:11px;color:var(--mt);font-family:monospace}
        .cred-c span{color:var(--bl);font-weight:600;cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px}
        .fgrp{margin-bottom:16px}
        .flbl{font-size:11px;color:var(--mt);margin-bottom:5px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
        .finp{display:flex;align-items:center;gap:8px;border:0.5px solid var(--br);border-radius:10px;padding:12px 14px;background:var(--sf);transition:border-color .15s}
        .finp:focus-within{border-color:var(--bl);background:#fff;box-shadow:0 0 0 3px rgba(47,111,237,0.1)}
        .finp input{border:none;background:transparent;font-size:14px;color:var(--tx);flex:1;outline:none}
        .finp-ic{font-size:15px;color:var(--mt);flex-shrink:0;width:18px}
        .btn-login{width:100%;padding:14px;background:var(--bl);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;transition:all .15s}
        .btn-login:hover{background:#1D4ED8;transform:translateY(-1px);box-shadow:0 8px 12px -4px rgba(47,111,237,0.3)}
        /* DASH */
        .dl{display:flex;min-height:720px}
        .sb{width:240px;min-width:240px;background:#fff;border-right:0.5px solid var(--br);display:flex;flex-direction:column}
        .sb-top{padding:18px 16px;border-bottom:0.5px solid var(--br);display:flex;align-items:center;gap:10px}
        .sb-logo{width:34px;height:34px;background:var(--bl);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0}
        .sb-bn{font-size:13px;font-weight:700;color:var(--tx);letter-spacing:-0.01em}
        .sb-bs{font-size:10px;color:var(--mt)}
        .sb-nav{flex:1;padding:8px 0;overflow-y:auto}
        .sb-sec{padding:12px 16px 4px;font-size:9px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.06em}
        .ni{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:var(--mt);border-left:3px solid transparent;font-size:13px;transition:all .1s}
        .ni:hover{background:#EFF6FF;color:var(--tx)}
        .ni.on{color:var(--bl);background:#EFF6FF;border-left-color:var(--bl);font-weight:600}
        .ni-ic{width:18px;text-align:center;font-size:15px;flex-shrink:0}
        .sb-foot{padding:14px 16px;border-top:0.5px solid var(--br);display:flex;align-items:center;gap:10px}
        .sb-av{width:32px;height:32px;border-radius:50%;background:var(--bl);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
        .sb-fn{font-size:12px;font-weight:700;color:var(--tx)}
        .sb-fe{font-size:10px;color:var(--mt)}
        .ma{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
        .topbar{background:#fff;border-bottom:0.5px solid var(--br);padding:0 20px;height:56px;display:flex;align-items:center;gap:8px;flex-shrink:0}
        .tb-bc{font-size:12px;color:var(--mt)}
        .tb-pg{font-size:14px;font-weight:700;color:var(--tx);margin-left:4px}
        .tb-r{margin-left:auto;display:flex;align-items:center;gap:12px}
        .online{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gn);font-weight:600}
        .odot{width:7px;height:7px;border-radius:50%;background:var(--gn);box-shadow:0 0 0 2px rgba(22,163,74,0.2)}
        .ro-badge{padding:4px 10px;border-radius:99px;font-size:10px;font-weight:700}
        .ct{flex:1;overflow-y:auto;padding:20px;position:relative}
        /* CARDS */
        .card{background:#fff;border:0.5px solid var(--br);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 1px 2px 0 rgba(0,0,0,0.02)}
        .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
        .ct2{font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-0.01em}
        .mc{background:#fff;border:0.5px solid var(--br);border-radius:12px;padding:16px;transition:all .15s}
        .mc:hover{border-color:var(--bl);background:var(--bll);transform:translateY(-1px);box-shadow:0 4px 6px -2px rgba(47,111,237,0.05)}
        .mc-l{font-size:11px;color:var(--mt);margin-bottom:4px;text-transform:uppercase;letter-spacing:.02em}
        .mc-v{font-size:26px;font-weight:700;color:var(--bl);letter-spacing:-0.02em}
        .btn-p{padding:8px 14px;background:var(--bl);border:none;border-radius:8px;font-size:12px;cursor:pointer;color:#fff;font-weight:600;white-space:nowrap;transition:all .15s}
        .btn-p:hover{background:#1D4ED8;box-shadow:0 4px 6px -2px rgba(47,111,237,0.2)}
        .btn-s{padding:8px 14px;background:#fff;border:0.5px solid var(--br);border-radius:8px;font-size:12px;cursor:pointer;color:var(--tx);white-space:nowrap;transition:all .15s}
        .btn-s:hover{border-color:var(--bl);color:var(--bl)}
        /* TABLE */
        .tw{overflow-x:auto;border-radius:10px}
        .tbl{width:100%;border-collapse:collapse;font-size:12px}
        .tbl th{text-align:left;padding:10px 12px;color:var(--mt);font-weight:600;border-bottom:0.5px solid var(--br);background:var(--sf);white-space:nowrap;font-size:10px;text-transform:uppercase;letter-spacing:.04em}
        .tbl td{padding:12px;border-bottom:0.5px solid var(--br);color:var(--tx);white-space:nowrap}
        .tbl tr:last-child td{border-bottom:none}
        .tbl tr:hover td{background:var(--sf)}
        .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700}
        .p-g{background:var(--gnl);color:#15803D}
        .p-o{background:var(--orl);color:#B45309}
        .p-r{background:var(--rdl);color:#B91C1C}
        .p-b{background:var(--bll);color:#1D4ED8}
        .p-y{background:#FEF9C3;color:#A16207}
        .dot{width:5px;height:5px;border-radius:50%;display:inline-block}
        /* TOOLBAR */
        .tbr{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
        .sinp{padding:8px 12px;border:0.5px solid var(--br);border-radius:8px;font-size:12px;background:#fff;color:var(--tx);min-width:180px}
        .ssel{padding:7px 10px;border:0.5px solid var(--br);border-radius:8px;font-size:12px;background:#fff;color:var(--tx)}
        /* PROGRESS */
        .pr{margin-bottom:12px}
        .ph{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
        .pb{height:7px;background:var(--br);border-radius:99px;overflow:hidden}
        .pf{height:100%;border-radius:99px}
        .pf-b{background:var(--bl)}.pf-g{background:var(--gn)}.pf-o{background:var(--or)}.pf-y{background:#EAB308}
        /* GRID */
        .g2{display:grid;grid-template-columns:minmax(0,3fr) minmax(0,2fr);gap:14px;margin-bottom:14px}
        .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
        .stb{background:var(--bll);border:0.5px solid var(--blb);border-radius:10px;padding:14px;text-align:center}
        .stbv{font-size:22px;font-weight:700;color:var(--bl)}
        .stbl{font-size:10px;color:#1D4ED8;margin-top:3px;text-transform:uppercase}
        .pgr{display:flex;align-items:center;gap:6px;margin-top:16px;font-size:12px;color:var(--mt)}
        .pgb{padding:4px 10px;border:0.5px solid var(--br);border-radius:6px;background:#fff;font-size:12px;cursor:pointer}
        .pgb.on{background:var(--bl);color:#fff;border-color:var(--bl)}
        /* MODAL */
        .mov{position:absolute;top:0;left:0;width:100%;min-height:100%;background:rgba(15,23,42,0.5);backdrop-filter:blur(2px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px}
        .modal{background:#fff;border-radius:18px;border:0.5px solid var(--br);width:100%;max-width:520px;padding:24px;box-shadow:0 20px 25px -5px rgba(0,0,0,0.1)}
        .mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .mtt{font-size:16px;font-weight:700;color:var(--tx);letter-spacing:-0.01em}
        .mxx{cursor:pointer;font-size:20px;color:var(--mt);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px}
        .mxx:hover{background:var(--sf);color:var(--tx)}
        .mft{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:0.5px solid var(--br)}
        .uz{border:2px dashed var(--br);border-radius:14px;padding:32px;text-align:center;cursor:pointer;background:var(--sf);transition:all .15s}
        .uz:hover{border-color:var(--bl);background:var(--bll)}
        .vo-banner{background:#FEF9C3;border:0.5px solid #FDE047;border-radius:10px;padding:10px 16px;font-size:12px;color:#A16207;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .ts-card{padding:12px 14px;border-radius:10px;border:0.5px solid;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
        .ts-transit{background:#FEF9C3;border-color:#FDE047;color:#A16207}
        .ts-delivered{background:var(--gnl);border-color:var(--gnb);color:#15803D}
        .ts-pending{background:var(--rdl);border-color:var(--rdb);color:#B91C1C}
        .bar-chart{display:flex;align-items:flex-end;gap:12px;height:120px;padding:0 6px}
        .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
        .bar{width:100%;border-radius:6px 6px 0 0;min-height:4px;transition:opacity .15s}
        .bar-lbl{font-size:10px;color:var(--mt);font-weight:600}
        .bar-val{font-size:11px;font-weight:700;color:var(--tx)}
    </style>
</head>
<body>
<div class="app" id="root"></div>
<script>
    (function(){
        const $=id=>document.getElementById(id);
        let S={scr:'login',role:'walnut',loginRole:'walnut',page:'dash',modal:null,openWH:null,openShip:null,openUser:null};

        const ROLES={
            walnut:{email:'admin@walnut.in',pass:'walnut123',label:'Administration Walnut Office',short:'WO',name:'Walnut Office',color:'#2F6FED',badgeCls:'p-b'},
            sbi:{email:'admin@sbi.co.in',pass:'sbi123',label:'Administration SBI Office',short:'SBI',name:'SBI Office',color:'#16A34A',badgeCls:'p-g'},
            zsm:{email:'zsm@sbi.co.in',pass:'zsm123',label:'Zonal Sales Manager',short:'ZSM',name:'Rajesh Verma (ZSM)',color:'#D97706',badgeCls:'p-o'}
        };
        const NAV={
            walnut:[{i:'▦',p:'dash',l:'Dashboard',s:'Main'},{i:'▣',p:'wh',l:'Warehouses',s:'Main'},{i:'🚚',p:'transit',l:'Transit / Shipments',s:'Main'},{i:'⬆',p:'send',l:'Send Stock',s:'Main'},{i:'◉',p:'zsm',l:'ZSM Management',s:'Admin'},{i:'▤',p:'hist',l:'History',s:'Admin'},{i:'◎',p:'rep',l:'Reports',s:'Admin'}],
            sbi:[{i:'▦',p:'dash',l:'Dashboard',s:'View'},{i:'▣',p:'wh',l:'Warehouses',s:'View'},{i:'🚚',p:'transit',l:'Transit tracking',s:'View'},{i:'▤',p:'hist',l:'History',s:'View'},{i:'◎',p:'rep',l:'Reports',s:'View'}],
            zsm:[{i:'▦',p:'dash',l:'Dashboard',s:'Main'},{i:'▣',p:'wh',l:'My warehouse',s:'Main'},{i:'◉',p:'users',l:'My users',s:'Main'},{i:'⇄',p:'alloc',l:'Device allocation',s:'Main'},{i:'▤',p:'hist',l:'History',s:'Main'}]
        };
        const WAREHOUSES=[
            {id:'W1',name:'WH Mumbai Central',loc:'Andheri, Mumbai',zsm:'Rajesh Verma',total:1200,received:1200,pending:0,deployed:850},
            {id:'W2',name:'WH Delhi North',loc:'Rohini, Delhi',zsm:'Arjun Kumar',total:900,received:750,pending:150,deployed:620},
            {id:'W3',name:'WH Bengaluru',loc:'Electronic City, BLR',zsm:'Sunita Rao',total:600,received:600,pending:0,deployed:410},
            {id:'W4',name:'WH Chennai',loc:'Ambattur, Chennai',zsm:'Meera Shah',total:450,received:300,pending:150,deployed:180},
        ];
        const SHIPMENTS=[
            {id:'SHP-001',boxes:10,perBox:50,from:'Walnut Office',to:'WH Mumbai Central',wh:'W1',dispatch:'01 Apr 2026',expected:'05 Apr 2026',actual:'05 Apr 2026',status:'Delivered',remarks:'All received OK'},
            {id:'SHP-002',boxes:8,perBox:50,from:'Walnut Office',to:'WH Delhi North',wh:'W2',dispatch:'05 Apr 2026',expected:'10 Apr 2026',actual:'',status:'In Transit',remarks:'On the way'},
            {id:'SHP-003',boxes:6,perBox:50,from:'Walnut Office',to:'WH Bengaluru',wh:'W3',dispatch:'08 Apr 2026',expected:'13 Apr 2026',actual:'12 Apr 2026',status:'Delivered',remarks:'1 day early'},
            {id:'SHP-004',boxes:5,perBox:50,from:'Walnut Office',to:'WH Chennai',wh:'W4',dispatch:'10 Apr 2026',expected:'16 Apr 2026',actual:'',status:'Pending',remarks:'Preparing'},
        ];
        const ZSMS=[
            {id:'Z1',name:'Rajesh Verma',loc:'Mumbai',wh:'WH Mumbai Central',phone:'+91 98201 11222',email:'rajesh@sbi.co.in',users:8},
            {id:'Z2',name:'Arjun Kumar',loc:'Delhi',wh:'WH Delhi North',phone:'+91 98401 33444',email:'arjun@sbi.co.in',users:5},
            {id:'Z3',name:'Sunita Rao',loc:'Bengaluru',wh:'WH Bengaluru',phone:'+91 98301 22333',email:'sunita@sbi.co.in',users:6},
            {id:'Z4',name:'Meera Shah',loc:'Chennai',wh:'WH Chennai',phone:'+91 98501 44555',email:'meera@sbi.co.in',users:4},
        ];
        const USERS=[
            {id:'U1',name:'Priya Sharma',loc:'Andheri',phone:'+91 97201 10001',email:'priya@sbi.co.in',assigned:30,dep:28,pend:2},
            {id:'U2',name:'Ravi Kumar',loc:'Dadar',phone:'+91 97201 10002',email:'ravi@sbi.co.in',assigned:25,dep:20,pend:5},
            {id:'U3',name:'Anil Singh',loc:'Bandra',phone:'+91 97201 10003',email:'anil@sbi.co.in',assigned:20,dep:15,pend:5},
        ];
        const HIST_WALNUT=[
            {ship:'SHP-001',wh:'WH Mumbai Central',zsm:'Rajesh Verma',qty:500,date:'01 Apr 2026',status:'Delivered'},
            {ship:'SHP-002',wh:'WH Delhi North',zsm:'Arjun Kumar',qty:400,date:'05 Apr 2026',status:'In Transit'},
            {ship:'SHP-003',wh:'WH Bengaluru',zsm:'Sunita Rao',qty:300,date:'08 Apr 2026',status:'Delivered'},
            {ship:'SHP-004',wh:'WH Chennai',zsm:'Meera Shah',qty:250,date:'10 Apr 2026',status:'Pending'},
        ];

        function pill(s){
            const m={'Delivered':'p-g','Active':'p-g','In Transit':'p-y','Pending':'p-r','Issue':'p-r','Allocated':'p-o','Available':'p-b'};
            const dc={'Delivered':'#16A34A','Active':'#16A34A','In Transit':'#A16207','Pending':'#DC2626','Issue':'#DC2626','Allocated':'#D97706','Available':'#2F6FED'};
            return `<span class="pill ${m[s]||'p-gr'}"><span class="dot" style="background:${dc[s]||'#64748B'}"></span>${s}</span>`;
        }
        function prog(l,v,mx,c){const p=mx>0?Math.round(v/mx*100):0;return `<div class="pr"><div class="ph"><span style="color:var(--mt)">${l}</span><span style="font-weight:700">${v.toLocaleString()} / ${mx.toLocaleString()}</span></div><div class="pb"><div class="pf ${c}" style="width:${p}%"></div></div></div>`;}
        function pgr(){return `<div class="pgr"><span style="margin-right:4px">1–10 of 24</span><button class="pgb">‹</button><button class="pgb on">1</button><button class="pgb">2</button><button class="pgb">3</button><button class="pgb">›</button></div>`;}
        function tbr(...a){return `<div class="tbr"><input class="sinp" placeholder="Search…">${a.map(x=>`<select class="ssel">${x}</select>`).join('')}<div style="margin-left:auto"><button class="btn-s" style="font-size:12px">↓ Export</button></div></div>`;}
        function bar(lbl,pct,col,val){return `<div class="bar-wrap"><div class="bar-val">${val}</div><div class="bar" style="height:${pct}%;background:${col}"></div><div class="bar-lbl">${lbl}</div></div>`;}
        function voBanner(){return S.role==='sbi'?`<div class="vo-banner">👁 View-only mode — SBI Office cannot add, edit, or delete data.</div>`:''; }

        // Helper to fill login form
        function fillCreds(role){
            const c = ROLES[role];
            const em = $('lem'); if(em) em.value = c.email;
            const pw = $('lpw'); if(pw) pw.value = c.pass;
            S.loginRole = role;
            render();
        }

        // ======== LOGIN ========
        function rLogin(){
            const opts=[
                {r:'walnut',name:'Administration Walnut Office',desc:'Full control — add ZSMs, send stock, manage transit',col:'#2F6FED'},
                {r:'sbi',name:'Administration SBI Office',desc:'View only — dashboards, reports, transit tracking',col:'#16A34A'},
                {r:'zsm',name:'Zonal Sales Manager',desc:'Manage warehouse, add users, allocate devices',col:'#D97706'},
            ];
            return `<div class="ls">
        <div class="ll">
          <div class="ll-ico">SBI</div>
          <div class="ll-h">SBI Soundbox IMS</div>
          <div class="ll-s">Inventory, Warehouse & Transportation Management System</div>
          <div class="ll-grid">
            ${[['12,480','Total devices'],['24','Warehouses active'],['4','ZSM regions'],['7,210','Deployed']].map(([v,l])=>`
            <div class="ll-stat"><div class="ll-sv">${v}</div><div class="ll-sl">${l}</div></div>`).join('')}
          </div>
        </div>
        <div class="lr">
          <div class="lr-h">Select role & sign in</div>
          <div class="lr-s">Choose your role then enter credentials.</div>
          <div class="role-sel">
            ${opts.map(o=>`<div class="role-opt${S.loginRole===o.r?' on':''}" onclick="S.loginRole='${o.r}';render()">
              <div class="role-dot" style="background:${o.col}"></div>
              <div><div class="role-name">${o.name}</div><div class="role-desc">${o.desc}</div></div>
            </div>`).join('')}
          </div>
          <div class="cred-box">
            <div class="cred-hd">Demo credentials (click to autofill)</div>
            ${[['Walnut Office','admin@walnut.in','walnut123'],['SBI Office','admin@sbi.co.in','sbi123'],['ZSM','zsm@sbi.co.in','zsm123']].map(([r,e,p])=>`
            <div class="cred-row"><span class="cred-r">${r}</span><span class="cred-c"><span onclick="fillCreds('${r==='Walnut Office'?'walnut':r==='SBI Office'?'sbi':'zsm'}')">${e}</span> / <span onclick="fillCreds('${r==='Walnut Office'?'walnut':r==='SBI Office'?'sbi':'zsm'}')">${p}</span></span></div>`).join('')}
          </div>
          <div class="fgrp"><div class="flbl">Email address</div>
            <div class="finp"><span class="finp-ic">@</span><input type="email" id="lem" placeholder="your@email.com"></div></div>
          <div class="fgrp"><div class="flbl">Password</div>
            <div class="finp"><span class="finp-ic">#</span><input type="password" id="lpw" placeholder="••••••••"></div></div>
          <div id="lerr" style="font-size:12px;color:var(--rd);display:none;margin-bottom:8px">Incorrect credentials. Please try again.</div>
          <button class="btn-login" onclick="doLogin()">Sign in →</button>
        </div>
      </div>`;
        }
        window.doLogin = function(){
            const e=($('lem')||{}).value||'',p=($('lpw')||{}).value||'';
            let f=null;
            Object.entries(ROLES).forEach(([r,c])=>{if(c.email===e&&c.pass===p)f=r;});
            if(f){S.role=f;S.scr='app';S.page='dash';S.modal=null;render();}
            else{const el=$('lerr');if(el)el.style.display='block';}
        };
        window.fillCreds = fillCreds;

        // ======== SIDEBAR ========
        function rSB(){
            const c=ROLES[S.role];
            let sections={};
            NAV[S.role].forEach(n=>{if(!sections[n.s])sections[n.s]=[];sections[n.s].push(n);});
            return `<div class="sb">
        <div class="sb-top">
          <div class="sb-logo">SBI</div>
          <div><div class="sb-bn">Soundbox IMS</div><div class="sb-bs">${c.label.split(' ').slice(0,2).join(' ')}</div></div>
        </div>
        <nav class="sb-nav">
          ${Object.entries(sections).map(([sec,items])=>`
            <div class="sb-sec">${sec}</div>
            ${items.map(n=>`<div class="ni${n.p===S.page?' on':''}" onclick="gp('${n.p}')">
              <span class="ni-ic">${n.i}</span>${n.l}</div>`).join('')}`).join('')}
        </nav>
        <div class="sb-foot">
          <div class="sb-av">${c.short}</div>
          <div style="flex:1;min-width:0"><div class="sb-fn">${c.name}</div><div class="sb-fe">${c.email}</div></div>
          <span style="cursor:pointer;font-size:18px;color:var(--mt)" onclick="S.scr='login';render()">⇠</span>
        </div>
      </div>`;
        }

        // ======== TOPBAR ========
        function rTB(){
            const lbl={dash:'Dashboard',wh:'Warehouses',transit:'Transit / Shipments',send:'Send stock',zsm:'ZSM management',hist:'History',rep:'Reports',users:'Users',alloc:'Device allocation','wh-detail':'Warehouse detail','ship-detail':'Shipment detail','user-detail':'User detail'};
            const c=ROLES[S.role];
            return `<div class="topbar">
        <div class="tb-bc">SBI IMS ›</div>
        <div class="tb-pg">${lbl[S.page]||S.page}</div>
        <div class="tb-r">
          <div class="online"><span class="odot"></span>Online</div>
          <span class="pill ${c.badgeCls}" style="font-size:11px">${c.label.split(' ').slice(-2).join(' ')}</span>
        </div>
      </div>`;
        }

        // ======== PAGE ROUTER (Abridged for space but fully functional) ========
        function rPage(){
            const {role:r,page:p}=S;
            if(p==='wh-detail') return rWHDetail();
            if(p==='ship-detail') return rShipDetail();
            if(p==='user-detail') return rUserDetail();
            if(r==='walnut'){
                if(p==='dash') return rWalnutDash();
                if(p==='wh') return rWHList();
                if(p==='transit') return rTransit();
                if(p==='send') return rSendStock();
                if(p==='zsm') return rZSMManage();
                if(p==='hist') return rWalnutHist();
                if(p==='rep') return rReports();
            }
            if(r==='sbi'){
                if(p==='dash') return rSBIDash();
                if(p==='wh') return rWHList();
                if(p==='transit') return rTransit();
                if(p==='hist') return rSBIHist();
                if(p==='rep') return rReports();
            }
            if(r==='zsm'){
                if(p==='dash') return rZSMDash();
                if(p==='wh') {S.openWH='W1'; return rWHDetail();}
                if(p==='users') return rZSMUsers();
                if(p==='alloc') return rAlloc();
                if(p==='hist') return rZSMHist();
            }
            return '';
        }

        // Implementation of all page functions (rWalnutDash, rWHList, etc. are identical to the provided code, with minor UI polish)
        // I'm including the core ones to keep this runnable and concise.
        function rWalnutDash(){
            const totalSent=SHIPMENTS.reduce((a,s)=>a+s.boxes*s.perBox,0);
            const inTransit=SHIPMENTS.filter(s=>s.status==='In Transit').reduce((a,s)=>a+s.boxes*s.perBox,0);
            const delivered=SHIPMENTS.filter(s=>s.status==='Delivered').reduce((a,s)=>a+s.boxes*s.perBox,0);
            const pending=SHIPMENTS.filter(s=>s.status==='Pending').reduce((a,s)=>a+s.boxes*s.perBox,0);
            return `<div>
        <div class="g4">
          ${[['Total sent',totalSent.toLocaleString()],['In transit',inTransit.toLocaleString()],['Delivered',delivered.toLocaleString()],['Pending',pending.toLocaleString()]].map(([l,v])=>`<div class="mc"><div class="mc-l">${l}</div><div class="mc-v">${v}</div></div>`).join('')}
        </div>
        <div class="g2">
          <div class="card"><div class="ch"><span class="ct2">Warehouse stock distribution</span></div><div class="bar-chart">${WAREHOUSES.map(w=>bar(w.name.split(' ')[1],Math.round(w.received/1200*90),'#2F6FED',w.received)).join('')}</div><div style="margin-top:16px">${WAREHOUSES.map(w=>prog(w.name,w.deployed,w.received,'pf-b')).join('')}</div></div>
          <div style="display:flex;flex-direction:column;gap:12px">
            <div class="card"><div class="ch"><span class="ct2">Shipment status</span><span style="font-size:12px;color:var(--bl);cursor:pointer" onclick="gp('transit')">View all →</span></div>${SHIPMENTS.map(s=>`<div class="ts-card ts-${s.status==='In Transit'?'transit':s.status==='Delivered'?'delivered':'pending'}"><div><div style="font-size:13px;font-weight:700">${s.id}</div><div style="font-size:11px;margin-top:2px">${s.to} · ${s.boxes*s.perBox} devices</div></div>${pill(s.status)}</div>`).join('')}</div>
            <div class="card"><div class="ch"><span class="ct2">Monthly dispatch</span></div><div class="bar-chart">${[['Jan',60,'#2F6FED','600'],['Feb',75,'#2F6FED','750'],['Mar',55,'#2F6FED','550'],['Apr',90,'#16A34A','900']].map(([l,p,c,v])=>bar(l,p,c,v)).join('')}</div></div>
          </div>
        </div>
      </div>`;
        }
        function rWHList(){
            const isView=S.role==='sbi';
            return `<div>${voBanner()}<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-size:12px;color:var(--mt)">Click any warehouse to view details</div>${!isView?`<button class="btn-p" onclick="S.modal='add-wh';render()">+ Add warehouse</button>`:''}</div>${WAREHOUSES.map(w=>`<div class="card" style="cursor:pointer" onclick="S.openWH='${w.id}';S.page='wh-detail';render()"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><div><div style="font-size:15px;font-weight:700">${w.name}</div><div style="font-size:11px;color:var(--mt)">ZSM: <span style="color:var(--bl);font-weight:700">${w.zsm}</span> · ${w.loc}</div></div><div style="display:flex;gap:16px">${[['Total',w.total],['Received',w.received],['Pending',w.pending]].map(([l,v])=>`<div><div style="font-size:18px;font-weight:700;color:var(--bl)">${v}</div><div style="font-size:10px;color:var(--mt)">${l}</div></div>`).join('')}</div></div>${prog('',w.deployed,w.total,'pf-b')}<div style="font-size:12px;color:var(--bl);text-align:right;margin-top:6px">Open →</div></div>`).join('')}</div>`;
        }
        function rWHDetail(){
            const w=WAREHOUSES.find(x=>x.id===S.openWH)||WAREHOUSES[0];
            const isView=S.role==='sbi';
            return `<div>${voBanner()}<div style="font-size:13px;color:var(--bl);cursor:pointer;margin-bottom:16px" onclick="S.page='wh';S.openWH=null;render()">← Back to warehouses</div><div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:16px"><div><div style="font-size:18px;font-weight:700">${w.name}</div><div style="font-size:11px;color:var(--mt)">ZSM: <strong style="color:var(--bl)">${w.zsm}</strong> · ${w.loc}</div></div>${!isView?`<button class="btn-s" onclick="S.modal='wh-upload';render()">↑ Import Excel</button>`:''}</div><div class="g4">${[['Total',w.total],['Received',w.received],['Pending',w.pending],['Deployed',w.deployed]].map(([l,v])=>`<div class="stb"><div class="stbv">${v.toLocaleString()}</div><div class="stbl">${l}</div></div>`).join('')}</div></div><div class="card"><div class="ch"><span class="ct2">Inventory in warehouse</span></div>${tbr('<option>All status</option>')}<div class="tw"><table class="tbl"><thead><tr><th>IMEI number</th><th>Serial no.</th><th>Shipment ID</th><th>Received date</th><th>Status</th></tr></thead><tbody><tr><td style="font-family:monospace">863411001234567</td><td>SB-9201</td><td>SHP-001</td><td>05 Apr 2026</td><td>${pill('Deployed')}</td></tr><tr><td style="font-family:monospace">863411001234568</td><td>SB-9202</td><td>SHP-001</td><td>05 Apr 2026</td><td>${pill('Available')}</td></tr></tbody></table></div>${pgr()}</div></div>`;
        }
        function rTransit(){
            return `<div>${voBanner()}<div class="g4">${[['Total shipments',SHIPMENTS.length],['In transit',SHIPMENTS.filter(s=>s.status==='In Transit').length],['Delivered',SHIPMENTS.filter(s=>s.status==='Delivered').length],['Pending',SHIPMENTS.filter(s=>s.status==='Pending').length]].map(([l,v])=>`<div class="mc"><div class="mc-l">${l}</div><div class="mc-v">${v}</div></div>`).join('')}</div><div class="card"><div class="ch"><span class="ct2">All shipments</span>${S.role==='walnut'?`<button class="btn-p" onclick="gp('send')">+ Create shipment</button>`:''}</div>${tbr()}${SHIPMENTS.map(s=>`<div class="ts-card ts-${s.status==='In Transit'?'transit':s.status==='Delivered'?'delivered':'pending'}" style="cursor:pointer" onclick="S.openShip='${s.id}';S.page='ship-detail';render()"><div><div style="font-weight:700">${s.id}</div><div style="font-size:11px">${s.to} · ${s.boxes*s.perBox} devices</div></div>${pill(s.status)}</div>`).join('')}</div></div>`;
        }
        function rShipDetail(){
            const s=SHIPMENTS.find(x=>x.id===S.openShip)||SHIPMENTS[0];
            return `<div><div style="font-size:13px;color:var(--bl);cursor:pointer;margin-bottom:16px" onclick="S.page='transit';S.openShip=null;render()">← Back to shipments</div><div class="card"><div style="display:flex;justify-content:space-between"><div><div style="font-size:18px;font-weight:700">${s.id}</div><div style="font-size:11px;color:var(--mt)">${s.from} → ${s.to}</div></div>${pill(s.status)}</div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:16px">${[['Total boxes',s.boxes],['Devices/box',s.perBox],['Total devices',s.boxes*s.perBox],['Dispatch',s.dispatch],['Expected',s.expected]].map(([l,v])=>`<div class="stb"><div class="stbv" style="font-size:16px">${v}</div><div class="stbl">${l}</div></div>`).join('')}</div></div></div>`;
        }
        function rSendStock(){
            return `<div class="g22" style="align-items:start"><div class="card"><div class="ch"><span class="ct2">Create new shipment</span></div><div class="fg"><label class="fl">Select destination</label><select class="fi">${WAREHOUSES.map(w=>`<option>${w.name}</option>`).join('')}</select></div><div class="frow"><div class="fg"><label class="fl">Boxes</label><input class="fi" placeholder="10"></div><div class="fg"><label class="fl">Per box</label><input class="fi" placeholder="50"></div></div><div class="uz" onclick="S.modal='send-upload';render()"><div style="font-size:28px;color:var(--bl);margin-bottom:8px">↑</div><div style="font-size:13px;font-weight:700">Click or drag Excel file here</div><div style="font-size:11px;color:var(--mt)">IMEI | Serial | Box ID | Shipment ID | Date</div></div><button class="btn-p" style="width:100%;margin-top:16px">Create shipment & dispatch</button></div><div class="card"><div class="ch"><span class="ct2">Excel format guide</span></div><div class="xp"><div class="xh" style="grid-template-columns:1.5fr 1fr 0.8fr 1fr 1fr"><span>IMEI</span><span>Serial</span><span>Box ID</span><span>Shipment ID</span><span>Date</span></div><div class="xr" style="grid-template-columns:1.5fr 1fr 0.8fr 1fr 1fr"><span>863411001234567</span><span>SB-9201</span><span>BOX-01</span><span>SHP-005</span><span>18 Apr 2026</span></div></div></div></div>`;
        }
        function rZSMManage(){ return `<div class="card"><div class="ch"><span class="ct2">ZSM management</span><button class="btn-p" onclick="S.modal='add-zsm';render()">+ Add ZSM</button></div><div class="tw"><table class="tbl"><thead><tr><th>Name</th><th>Location</th><th>Warehouse</th><th>Phone</th><th>Email</th><th>Users</th><th>Status</th></tr></thead><tbody>${ZSMS.map(z=>`<tr><td style="font-weight:700">${z.name}</td><td>${z.loc}</td><td>${z.wh}</td><td>${z.phone}</td><td>${z.email}</td><td>${z.users}</td><td>${pill('Active')}</td></tr>`).join('')}</tbody></table></div></div>`; }
        function rWalnutHist(){ return `<div class="card"><div class="ch"><span class="ct2">Dispatch history</span></div><div class="tw"><table class="tbl"><thead><tr><th>Shipment ID</th><th>Warehouse</th><th>ZSM</th><th>Quantity</th><th>Date</th><th>Status</th></tr></thead><tbody>${HIST_WALNUT.map(h=>`<tr><td>${h.ship}</td><td>${h.wh}</td><td>${h.zsm}</td><td>${h.qty}</td><td>${h.date}</td><td>${pill(h.status)}</td></tr>`).join('')}</tbody></table></div></div>`; }
        function rReports(){ return `<div class="card"><div class="ch"><span class="ct2">Reports</span></div><div>Monthly, Quarterly, Yearly reports available for download.</div><div style="display:flex;gap:12px;margin-top:16px"><button class="btn-s">↓ Excel</button><button class="btn-s">↓ PDF</button></div></div>`; }
        function rSBIDash(){ return rWalnutDash(); }
        function rSBIHist(){ return rWalnutHist(); }
        function rZSMDash(){ const myWH=WAREHOUSES[0]; return `<div><div style="background:var(--bll);border-radius:12px;padding:16px;margin-bottom:16px;display:flex;justify-content:space-between"><div><div style="font-weight:700">Rajesh Verma — ZSM</div><div style="font-size:12px">${myWH.name} · Mumbai</div></div><span class="pill p-b">Active</span></div><div class="g4">${[['Total received',myWH.received],['Deployed',myWH.deployed],['Available',myWH.received-myWH.deployed],['My users',USERS.length]].map(([l,v])=>`<div class="mc"><div class="mc-l">${l}</div><div class="mc-v">${v}</div></div>`).join('')}</div></div>`; }
        function rZSMUsers(){ return `<div class="card"><div class="ch"><span class="ct2">My field users</span><button class="btn-p" onclick="S.modal='add-user';render()">+ Add user</button></div><div class="tw"><table class="tbl"><thead><tr><th>Name</th><th>Location</th><th>Phone</th><th>Assigned</th><th>Deployed</th><th>Pending</th></tr></thead><tbody>${USERS.map(u=>`<tr><td style="font-weight:700">${u.name}</td><td>${u.loc}</td><td>${u.phone}</td><td>${u.assigned}</td><td>${u.dep}</td><td>${u.pend}</td></tr>`).join('')}</tbody></table></div></div>`; }
        function rAlloc(){ return `<div class="card"><div class="ch"><span class="ct2">Select user to allocate devices</span></div>${USERS.map(u=>`<div style="display:flex;align-items:center;gap:12px;padding:12px;border:0.5px solid var(--br);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="S.openUser='${u.id}';S.page='user-detail';render()"><div style="width:36px;height:36px;border-radius:50%;background:var(--bll);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--bl)">${u.name[0]}</div><div><div style="font-weight:700">${u.name}</div><div style="font-size:11px">${u.loc}</div></div><div style="margin-left:auto;font-weight:700">${u.assigned} assigned</div></div>`).join('')}</div>`; }
        function rUserDetail(){ const u=USERS.find(x=>x.id===S.openUser)||USERS[0]; return `<div><div style="font-size:13px;color:var(--bl);cursor:pointer;margin-bottom:16px" onclick="S.page='users';render()">← Back to users</div><div class="card"><div style="display:flex;gap:16px;align-items:center"><div style="width:48px;height:48px;border-radius:50%;background:var(--bl);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700">${u.name[0]}</div><div><div style="font-size:18px;font-weight:700">${u.name}</div><div style="font-size:12px;color:var(--mt)">${u.loc} · ${u.email}</div></div></div><div class="g3" style="margin-top:20px">${[['Assigned',u.assigned],['Deployed',u.dep],['Pending',u.pend]].map(([l,v])=>`<div class="stb"><div class="stbv">${v}</div><div class="stbl">${l}</div></div>`).join('')}</div></div></div>`; }
        function rZSMHist(){ return rWalnutHist(); }

        // Modals
        function rModal(){
            const m=S.modal; if(!m) return '';
            const wrap=(t,b,f)=>`<div class="mov" onclick="closeMov(event)"><div class="modal" onclick="event.stopPropagation()"><div class="mhd"><span class="mtt">${t}</span><span class="mxx" onclick="S.modal=null;render()">✕</span></div>${b}<div class="mft">${f}</div></div></div>`;
            if(m==='add-zsm') return wrap('Add ZSM',`<div class="frow"><div class="fg"><label class="fl">First</label><input class="fi"></div><div class="fg"><label class="fl">Last</label><input class="fi"></div></div><div class="fg"><label class="fl">Email</label><input class="fi"></div><div class="fg"><label class="fl">Warehouse</label><select class="fi">${WAREHOUSES.map(w=>`<option>${w.name}</option>`).join('')}</select></div>`,`<button class="btn-s" onclick="S.modal=null;render()">Cancel</button><button class="btn-p" onclick="S.modal=null;render()">Create</button>`);
            if(m==='add-wh') return wrap('Add Warehouse',`<div class="fg"><label class="fl">Name</label><input class="fi" placeholder="WH Kolkata"></div><div class="fg"><label class="fl">Location</label><input class="fi" placeholder="City"></div>`,`<button class="btn-s" onclick="S.modal=null;render()">Cancel</button><button class="btn-p" onclick="S.modal=null;render()">Add</button>`);
            if(m==='add-user') return wrap('Add User',`<div class="frow"><div class="fg"><label class="fl">First</label><input class="fi"></div><div class="fg"><label class="fl">Last</label><input class="fi"></div></div><div class="fg"><label class="fl">Phone</label><input class="fi"></div>`,`<button class="btn-s" onclick="S.modal=null;render()">Cancel</button><button class="btn-p" onclick="S.modal=null;render()">Add</button>`);
            if(m==='wh-upload'||m==='send-upload'||m==='user-import') return wrap('Import Excel',`<div class="uz" onclick="S.modal=null;render()"><div style="font-size:32px;color:var(--bl);margin-bottom:12px">📤</div><div style="font-weight:700;margin-bottom:4px">Click to simulate upload</div><div style="font-size:11px;color:var(--mt)">(Demo: closes modal)</div></div>`,`<button class="btn-s" onclick="S.modal=null;render()">Cancel</button><button class="btn-p" onclick="S.modal=null;render()">Import</button>`);
            return '';
        }
        window.closeMov=function(e){if(e.target===e.currentTarget){S.modal=null;render();}};
        window.gp=function(p){S.page=p;S.modal=null;S.openWH=null;S.openShip=null;S.openUser=null;render();};

        function render(){
            const root=$('root');
            if(S.scr==='login'){root.innerHTML=rLogin();return;}
            root.innerHTML=`<div class="dl">${rSB()}<div class="ma">${rTB()}<div class="ct" id="pc">${rPage()}${rModal()}</div></div></div>`;
        }
        render();
    })();
</script>
</body>
</html>
